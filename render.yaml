services:
  - type: web
    name: nexus-atms-dashboard
    env: python
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: LIVE_MODE
        value: "false"
      - key: FAIL_FAST_VIDEO
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"
