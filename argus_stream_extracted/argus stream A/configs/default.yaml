project:
  name: argus_stream_a
  seed: 42

data:
  dataset: ubnormal
  data_dir: ./data
  train_split: train
  val_split: val
  test_split: test
  num_scenes: null
  fps: null

backbone:
  scene: videomae_v2_base

stream_a:
  hidden_dim: 4096
  sigma_low: 0.001
  sigma_high: 1.0
  eval_L: 16
  beta: 1.0
  gmm_components: 5
  layernorm: false
  batch_size: 2048

training:
  batch_size: 2048
  learning_rate: 1.0e-4
  epochs: 1000
  optimizer: adam
  weight_decay: 0.0
  adam_betas: [0.5, 0.9]
  scheduler: none
  scheduler_kwargs: {}
  grad_clip: null
  checkpoint_interval_epochs: 25
  model_selection_metric: clip_auc
  ema:
    enabled: false
    decay: 0.999

evaluation:
  metric: frame_auc
  signal_kind: score_norm
  sigma_strategy: single_sigma
  gmm_components: 5
  single_sigma_index: 0
  smoothing_sigma: 20
  sweep_gmm_components: [1, 3, 5]
  sweep_smoothing_sigmas: [0, 1, 3, 5, 7, 10, 15, 20]
